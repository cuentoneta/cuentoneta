name: CI

on:
  pull_request:
  # Push a develop: corre el CI al mergear y, sobre todo, guarda el cache de Nx en la rama default.
  # Por el scoping de actions/cache, ese cache base lo pueden restaurar todos los PRs (warm desde
  # el primer push), no solo los pushes de un mismo PR.
  push:
    branches: [develop]
  # Permite dispararlo manualmente y desde `prepare-release-pr.yml`: el PR `develop → master` lo crea
  # el GITHUB_TOKEN, que por anti-recursión no gatilla `pull_request`; `workflow_dispatch` es la
  # excepción (sí corre invocado por el token), así que da señal de CI sobre `develop` para el release.
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22.22.3
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --force --frozen-lockfile --ignore-scripts

      - name: Generate testing environment file
        run: pnpm run config

      - name: Rebuild and prepare
        run: pnpm rebuild && pnpm run prepare --if-present

      # El workspace se comparte entre jobs con upload/download-artifact (entrega garantizada
      # dentro del run), no con actions/cache: cachear todo el workspace (key por sha) se
      # evicta bajo el límite de 10 GB por repo y deja a los jobs downstream sin lockfile.
      # --anchored + prefijo ./ : sin anclar, un --exclude sin slash matchea el basename en
      # CUALQUIER nivel, así que 'dist' borraba todos los node_modules/**/dist (rompía los paquetes).
      - name: Pack workspace
        run: tar -cf workspace.tar --anchored --exclude='./workspace.tar' --exclude='./.git' --exclude='./dist' --exclude='./.nx/cache' .

      - name: Upload workspace artifact
        uses: actions/upload-artifact@v7
        with:
          name: workspace
          path: workspace.tar
          retention-days: 1

  test:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22.22.3

      - name: Download workspace artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace

      - name: Unpack workspace
        run: tar -xf workspace.tar

      # Capa de cache gratuita (cache de Actions) sobre el cache local de Nx: da hits sin consumir
      # créditos de Nx Cloud, y sigue funcionando si Nx Cloud se queda sin créditos o no responde.
      - name: Cache de Nx local (fallback sin Nx Cloud)
        uses: actions/cache@v6
        with:
          path: .nx/cache
          key: nx-cache-test-${{ github.sha }}
          restore-keys: |
            nx-cache-test-

      - name: Run Tests
        run: bash .github/scripts/nx-run.sh nx test
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

      # A) Reporte navegable (html + lcov) como artefacto descargable del workflow.
      - name: Upload coverage artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/cuentoneta
          retention-days: 7

      # B) Comentario en el PR + job summary a partir del coverage de Vitest.
      - name: Coverage PR report
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/cuentoneta/coverage-summary.json
          json-final-path: coverage/cuentoneta/coverage-final.json

      # C) Subida a Codecov (badge + tendencia histórica). Requiere el secret CODECOV_TOKEN.
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          files: coverage/cuentoneta/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22.22.3

      - name: Download workspace artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace

      - name: Unpack workspace
        run: tar -xf workspace.tar

      - name: Cache de Nx local (fallback sin Nx Cloud)
        uses: actions/cache@v6
        with:
          path: .nx/cache
          key: nx-cache-lint-${{ github.sha }}
          restore-keys: |
            nx-cache-lint-

      - name: Run Linter
        run: bash .github/scripts/nx-run.sh nx eslint:lint
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

  stylelint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22.22.3

      - name: Download workspace artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace

      - name: Unpack workspace
        run: tar -xf workspace.tar

      - name: Cache de Nx local (fallback sin Nx Cloud)
        uses: actions/cache@v6
        with:
          path: .nx/cache
          key: nx-cache-stylelint-${{ github.sha }}
          restore-keys: |
            nx-cache-stylelint-

      - name: Run stylelint
        run: bash .github/scripts/nx-run.sh nx stylelint @cuentoneta/app
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22.22.3

      - name: Download workspace artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace

      - name: Unpack workspace
        run: tar -xf workspace.tar

      - name: Cache de Nx local (fallback sin Nx Cloud)
        uses: actions/cache@v6
        with:
          path: .nx/cache
          key: nx-cache-typecheck-${{ github.sha }}
          restore-keys: |
            nx-cache-typecheck-

      - name: Run typecheck
        run: bash .github/scripts/nx-run.sh nx typecheck
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

  e2e:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22.22.3

      - name: Download workspace artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace

      - name: Unpack workspace
        run: tar -xf workspace.tar

      - name: Cache de Nx local (fallback sin Nx Cloud)
        uses: actions/cache@v6
        with:
          path: .nx/cache
          key: nx-cache-e2e-${{ github.sha }}
          restore-keys: |
            nx-cache-e2e-

      # El webServer de Playwright levanta el build SSR de producción (fidelidad con el crawler), así
      # que hay que compilarlo acá. Los e2e corren contra `staging` (espejo de producción, aislado del
      # `development` compartido que los devs mutan) para reducir la fragilidad por curación de contenido
      # (#1722); en local se usa `development` (default del .env). staging es público → no requiere token.
      - name: Build de producción para e2e (SSR real)
        run: bash .github/scripts/nx-run.sh nx run @cuentoneta/app:build:production
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
          SANITY_STUDIO_DATASET: staging
          SANITY_STUDIO_PROJECT_ID: ${{ secrets.SANITY_STUDIO_PROJECT_ID || 's4dbqkc5' }}
          SANITY_STUDIO_TOKEN: ${{ secrets.SANITY_STUDIO_TOKEN }}
          CLARITY_TOKEN: ${{ secrets.CLARITY_TOKEN }}
          CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}

      # Replica el hook `postbuild` de package.json, que `nx run` directo no dispara (solo el lifecycle
      # de `pnpm run build`). Parchea la referencia al index en el bundle del server.
      - name: Fix index file reference (postbuild)
        run: node scripts/fix-index-file-name.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # El webServer SSR resuelve el dataset en runtime (environment.ts lee process.env), no en build:
      # se fija acá `staging` para que sea el dataset que ve el crawler. Gana sobre el `development` del
      # .env porque process.loadEnvFile() no pisa variables ya presentes en el entorno.
      - name: Run Tests
        run: bash .github/scripts/nx-run.sh nx run @cuentoneta/app:e2e
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
          SANITY_STUDIO_DATASET: staging
          SANITY_STUDIO_PROJECT_ID: ${{ secrets.SANITY_STUDIO_PROJECT_ID || 's4dbqkc5' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: dist/.playwright/playwright-report/
          retention-days: 7

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22.22.3

      - name: Download workspace artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace

      - name: Unpack workspace
        run: tar -xf workspace.tar

      - name: Cache de Nx local (fallback sin Nx Cloud)
        uses: actions/cache@v6
        with:
          path: .nx/cache
          key: nx-cache-build-${{ github.sha }}
          restore-keys: |
            nx-cache-build-

      - name: Run build
        run: bash .github/scripts/nx-run.sh nx run @cuentoneta/app:build:production
        env:
          # Nx Cloud (cache remota de tareas)
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
          # Sanity / terceros. En PRs de forks los secrets llegan vacíos: para projectId/dataset
          # (públicos, ya son los defaults de set-environment.ts) caemos a esos valores para que el
          # build compile contra el dataset público de desarrollo. El token y los de terceros quedan
          # vacíos a propósito — no se exponen credenciales reales a un fork.
          SANITY_STUDIO_DATASET: ${{ secrets.SANITY_STUDIO_DATASET || 'development' }}
          SANITY_STUDIO_PROJECT_ID: ${{ secrets.SANITY_STUDIO_PROJECT_ID || 's4dbqkc5' }}
          SANITY_STUDIO_TOKEN: ${{ secrets.SANITY_STUDIO_TOKEN }}
          CLARITY_TOKEN: ${{ secrets.CLARITY_TOKEN }}
          CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}

  storybook:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22.22.3

      - name: Download workspace artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace

      - name: Unpack workspace
        run: tar -xf workspace.tar

      - name: Cache de Nx local (fallback sin Nx Cloud)
        uses: actions/cache@v6
        with:
          path: .nx/cache
          key: nx-cache-storybook-${{ github.sha }}
          restore-keys: |
            nx-cache-storybook-

      - name: Run Storybook build
        run: bash .github/scripts/nx-run.sh nx run @cuentoneta/app:build-storybook
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

  studio-build:
    runs-on: ubuntu-latest
    # Checkout propio, sin `needs: setup`: cms/ es un proyecto pnpm aparte (lockfile
    # propio, fuera del workspace de la raíz) y además referencia el árbol `src/` de la
    # raíz vía import relativo (schemas/contentCampaign.ts). El workspace.tar de `setup`
    # no instala cms/node_modules, así que reusarlo no ahorra nada.
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22.22.3
          cache: 'pnpm'
          cache-dependency-path: cms/pnpm-lock.yaml

      - name: Install CMS dependencies
        working-directory: cms
        run: pnpm install --frozen-lockfile --ignore-scripts

      # `sanity build` (bundler Vite/Rollup) es el gate autoritativo del Studio: un
      # `tsc --noEmit` sobre cms/ no sirve (ruido de moduleResolution sobre node_modules,
      # sin relación con errores reales de bundling). `--ignore-scripts` en el install
      # saltea el postinstall que genera cms/.env (set-environment.ts), así que las vars
      # que lee sanity.cli.ts se pasan acá explícitas, con fallback a los valores públicos
      # por defecto (s4dbqkc5/development) para que corra igual en PRs de forks sin secrets.
      - name: Build Sanity Studio
        working-directory: cms
        run: pnpm exec sanity build
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ secrets.SANITY_STUDIO_PROJECT_ID || 's4dbqkc5' }}
          SANITY_STUDIO_DATASET: ${{ secrets.SANITY_STUDIO_DATASET || 'development' }}
          # El CLI de Sanity corre desatendido cuando CI=true (Actions ya lo setea;
          # explícito por robustez, mismo patrón que el job deploy-studio de release.yml).
          CI: 'true'
