name: CI

on:
  pull_request:

jobs:
  setup:
    name: 'Setup and dependencies'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.22.3
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --force --frozen-lockfile --ignore-scripts

      - name: Generate testing environment file
        run: pnpm run config

      - name: Rebuild and prepare
        run: pnpm rebuild && pnpm run prepare --if-present

      # El workspace se comparte entre jobs con upload/download-artifact (entrega garantizada
      # dentro del run), no con actions/cache: cachear todo el workspace (key por sha) se
      # evicta bajo el límite de 10 GB por repo y deja a los jobs downstream sin lockfile.
      - name: Pack workspace
        run: tar -cf workspace.tar --exclude='.git' --exclude='dist' --exclude='.nx/cache' .

      - name: Upload workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: workspace.tar
          retention-days: 1

  test:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.22.3

      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Unpack workspace
        run: tar -xf workspace.tar

      - name: Run Tests
        run: npx nx test --skip-nx-cache

      # A) Reporte navegable (html + lcov) como artefacto descargable del workflow.
      - name: Upload coverage artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/cuentoneta
          retention-days: 7

      # B) Comentario en el PR + job summary a partir del coverage de Vitest.
      - name: Coverage PR report
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/cuentoneta/coverage-summary.json
          json-final-path: coverage/cuentoneta/coverage-final.json

      # C) Subida a Codecov (badge + tendencia histórica). Requiere el secret CODECOV_TOKEN.
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage/cuentoneta/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.22.3

      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Unpack workspace
        run: tar -xf workspace.tar

      - name: Run Linter
        run: npx nx lint --skip-nx-cache

  stylelint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.22.3

      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Unpack workspace
        run: tar -xf workspace.tar

      - name: Run stylelint
        run: npx nx stylelint @cuentoneta/app --skip-nx-cache

  e2e:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.22.3

      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Unpack workspace
        run: tar -xf workspace.tar

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Tests
        run: npx nx run @cuentoneta/app:e2e --skip-nx-cache

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: dist/.playwright/playwright-report/
          retention-days: 7

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.22.3

      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Unpack workspace
        run: tar -xf workspace.tar

      - name: Run build
        run: npx nx run @cuentoneta/app:build:production --skip-nx-cache
        env:
          SANITY_STUDIO_DATASET: ${{ secrets.SANITY_STUDIO_DATASET }}
          SANITY_STUDIO_PROJECT_ID: ${{ secrets.SANITY_STUDIO_PROJECT_ID }}
          SANITY_STUDIO_TOKEN: ${{ secrets.SANITY_STUDIO_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          CLARITY_TOKEN: ${{ secrets.CLARITY_TOKEN }}
          CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}

  storybook:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Select pnpm as package manager
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.12.1

      - name: Use Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.22.3

      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Unpack workspace
        run: tar -xf workspace.tar

      - name: Run Storybook build
        run: npx nx run @cuentoneta/app:build-storybook --skip-nx-cache
