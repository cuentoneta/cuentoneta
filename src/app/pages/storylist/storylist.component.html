<main class="my-8 block md:mt-0">
	<article
		[attr.aria-busy]="!storylist()"
		[lang]="storylist()?.language"
		class="grid grid-cols-1 gap-8 md:grid-cols-2 md:gap-16"
	>
		<!-- Renderizado de título y descripción -->
		<ng-container *ngTemplateOutlet="storylistTitleTemplate"> </ng-container>

		<!-- Renderizado de tarjetas de stories -->
		<section class="min-h-96 bg-white">
			<ol class="grid grid-cols-1 gap-6">
				@defer (when stories().length > 0) {
					@for (story of stories(); track $index) {
						<cuentoneta-story-card-teaser
							[story]="story"
							[showAuthor]="true"
							[order]="$index + 1"
							[navigationParams]="{
								navigation: 'storylist',
								navigationSlug: storylist()?.slug ?? ''
							}"
						/>
					}
				} @loading (minimum 500ms) {
					@for (_ of [].constructor(6); track $index) {
						<cuentoneta-story-card-teaser [showAuthor]="true" [order]="$index + 1" />
					}
				}
			</ol>
		</section>
	</article>
</main>

<ng-template #storylistTitleTemplate>
	@if (storylist(); as storylist) {
		<div class="flex flex-col gap-4">
			<div class="flex flex-col">
				<h1 class="h1 mb-5 text-center">
					{{ storylist.title }}
				</h1>
				<cuentoneta-portable-text-parser
					[paragraphs]="storylist.description"
					[classes]="'source-serif-pro-body-xl'"
				></cuentoneta-portable-text-parser>
			</div>
		</div>
	} @else {
		<div class="xs:max-md:col-span-1 md:col-span-6">
			<ngx-skeleton-loader
				[theme]="{
					'margin-bottom.px': 20,
					'height.px': 40,
					width: '100%',
					'background-color': skeletonColor
				}"
				count="1"
				appearance="line"
			></ngx-skeleton-loader>
			<ngx-skeleton-loader
				[theme]="{
					'margin-bottom.px': 10,
					'height.px': 20,
					width: '100%',
					'background-color': skeletonColor
				}"
				count="3"
				appearance="line"
			></ngx-skeleton-loader>
		</div>
	}
</ng-template>
